# Perfil para execução do JAR em servidor (Windows/Linux)
server.port=8080
server.address=0.0.0.0

spring.datasource.url=jdbc:h2:file:./data/supportwizard;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# Ollama no mesmo servidor (ajuste via --ollama.api.url= se necessário)
ollama.api.url=http://localhost:11434/api/generate
ollama.api.model=qwen2.5:7b

# CORS — rede interna (SPA embutido no JAR usa mesma origem; útil se houver proxy)
spring.web.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,http://172.16.*.*:*,http://10.*.*.*:*

# Base de conhecimento gravável (copie knowledge.csv para esta pasta)
knowledge.csv.path=./knowledge.csv

# Chat e base de conhecimento
chat.senha=!\@Key2014
knowledge.senha=!\@sdalcoat.25

logging.file.name=./logs/supportwizard.log
